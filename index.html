<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
    
    video {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      
      /* CRITICAL: Disables clicks, taps, and Safari long-press menus directly */
      pointer-events: none; 
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
  </style>
</head>
<body>

  <!-- No overlays needed. The attributes handle autoplay, the CSS handles anti-download -->
  <video autoplay loop muted playsinline disablePictureInPicture controlsList="nodownload">
    <source src="monkey.mp4" type="video/mp4" />
  </video>

  <script>
    // Global safety catch to completely prevent context menus anywhere on the page
    document.addEventListener('contextmenu', e => e.preventDefault(), { capture: true });
  </script>
</body>
</html>
