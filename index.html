<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
    
    .video-container {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      /* Crucial: Prevents iOS Safari from registering long-presses on the video */
      -webkit-touch-callout: none; 
    }

    /* The transparent guard layer that sits perfectly on top of the video */
    .guard-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      background: rgba(0,0,0,0); /* Completely clear */
      -webkit-touch-callout: none;
    }
  </style>
</head>
<body>

  <div class="video-container">
    <!-- This overlay catches and blocks the right-click before it can hit the video -->
    <div class="guard-overlay" oncontextmenu="return false;"></div>

    <video autoplay loop muted playsinline disablePictureInPicture>
      <source src="monkey.mp4" type="video/mp4" />
    </video>
  </div>

  <script>
    // Global fallback script to kill all right-click events
    document.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      return false;
    }, { capture: true });
  </script>
</body>
</html>
