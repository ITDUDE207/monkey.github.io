<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
    
    .video-container {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      -webkit-touch-callout: none; 
    }

    /* Clear shield blocking Safari download popups */
    .guard-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      background: rgba(0,0,0,0);
      -webkit-touch-callout: none;
    }
  </style>
</head>
<body>

  <div class="video-container">
    <div class="guard-overlay" oncontextmenu="return false;"></div>

    <!-- Added 'muted' explicitly as an attribute and property fallback -->
    <video id="myVideo" autoplay loop muted playsinline disablePictureInPicture controlsList="nodownload">
      <source src="monkey.mp4" type="video/mp4" />
    </video>
  </div>

  <script>
    const video = document.getElementById('myVideo');

    // Force initialization fixes for Safari background loading restrictions
    video.muted = true;
    
    // Explicitly command playback to bypass overlay event blocking
    const playPromise = video.play();
    if (playPromise !== undefined) {
      playPromise.catch(() => {
        // Fallback: If browser strictly requires an initial interaction anyway,
        // it triggers autoplay on the very first touch anywhere on the page.
        document.addEventListener('click', () => {
          video.play();
        }, { once: true });
      });
    }

    // Stop all right-clicks
    document.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      return false;
    }, { capture: true });
  </script>
</body>
</html>
